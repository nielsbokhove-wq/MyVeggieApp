<style data-purpose="branding-colors">
    :root {
      --bladgroen: #4CAF50;
    }
    .text-bladgroen { color: var(--bladgroen); }
    .bg-bladgroen { background-color: var(--bladgroen); }
    .fill-bladgroen { fill: var(--bladgroen); }
    .border-bladgroen { border-color: var(--bladgroen); }
  </style>
<style data-purpose="canvas-layout">
    #canvasWorkspace {
      position: absolute;
      width: 2000px;
      height: 2000px;
      top: 0;
      left: 0;
      transform-origin: 0 0;
      background-color: #fdfaf5;
      background-image: radial-gradient(#e5e7eb 1px, transparent 1px);
      background-size: 40px 40px;
      touch-action: none;
    }

    #centerAnchor {
      position: absolute;
      left: 1000px;
      top: 1000px;
      width: 8px;
      height: 8px;
      background-color: #d1d5db;
      border-radius: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      z-index: 5;
    }

    .garden-line-container {
      position: absolute;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: flex-start;
      touch-action: none;
      transform-origin: 0px 20px;
      padding-right: 20px;
    }

    .garden-veg-container {
      position: absolute;
      width: 120px;
      height: 130px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      touch-action: none;
      z-index: 20;
      filter: drop-shadow(0 8px 12px rgba(0,0,0,0.25));
      transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    
    .garden-veg-container svg {
      filter: drop-shadow(0 2px 2px rgba(0,0,0,0.1));
      transform: perspective(500px) rotateX(10deg);
    }

    .garden-veg-container:active {
      transform: scale(1.1) rotate(2deg);
      filter: drop-shadow(0 12px 20px rgba(0,0,0,0.3));
    }

    .garden-line {
      height: 10px;
      background: linear-gradient(to bottom, #8d6e63 0%, #795548 50%, #5d4037 100%);
      border-radius: 4px;
      pointer-events: none;
      box-shadow: 0 4px 4px rgba(0,0,0,0.3), inset 0 1px 1px rgba(255,255,255,0.2);
    }

    .stretch-handle {
      position: absolute;
      right: 0px; 
      width: 16px;
      height: 16px;
      background-color: #ffffff;
      border-radius: 50%;
      cursor: ew-resize;
      display: none;
      z-index: 30;
      box-shadow: 0 2px 6px rgba(0,0,0,0.2);
      border: 1px solid #e5e7eb;
    }
    
    .is-building .stretch-handle {
      display: block;
    }
    
    .is-selected {
      outline: 2px dashed #4CAF50;
      outline-offset: 4px;
    }

    .is-building .garden-line-container, 
    .is-building .garden-veg-container {
      cursor: move;
    }

    /* Library Screen Custom Scroll */
    #libraryList::-webkit-scrollbar, #harvestList::-webkit-scrollbar {
      width: 4px;
    }
    #libraryList::-webkit-scrollbar-track, #harvestList::-webkit-scrollbar-track {
      background: #f3f4f6;
    }
    #libraryList::-webkit-scrollbar-thumb, #harvestList::-webkit-scrollbar-thumb {
      background: #d1d5db;
      border-radius: 10px;
    }
    
    .library-accordion-content {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.3s ease-out;
    }
    .library-accordion-item.active .library-accordion-content {
      max-height: 1200px;
      transition: max-height 0.5s ease-in;
    }
    .library-accordion-item.active .chevron-icon {
      transform: rotate(180deg);
    }
  </style>
<style>#vegSubMenu span { font-size: 0.75rem !important; line-height: 1rem !important; padding-top: 4px; }</style>

<!-- BEGIN: Firebase & Auth Logic -->
<script data-purpose="firebase-setup" type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, doc, setDoc, getDoc, updateDoc, arrayUnion, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyByW25sPnpfCiuJobldmAdglpvqSTVkauY",
      authDomain: "myveggieapp-859a6.firebaseapp.com",
      projectId: "myveggieapp-859a6",
      storageBucket: "myveggieapp-859a6.firebasestorage.app",
      messagingSenderId: "20511651208",
      appId: "1:20511651208:web:eda2073c4bd2699d1af63d"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    let unsubscribeGarden = null;

    window.handleAuth = async (mode) => {
      const email = document.getElementById('emailInput').value;
      const pass = document.getElementById('passInput').value;
      
      if(!email || !pass) return alert(window.getI18n('alertFillEmail'));
      
      if(mode === 'register') {
        const passConfirm = document.getElementById('passConfirmInput').value;
        if(pass !== passConfirm) {
          return alert(window.getI18n('alertPassMismatch'));
        }
      }
      
      try {
        if(mode === 'login') {
          await signInWithEmailAndPassword(auth, email, pass);
        } else {
          await createUserWithEmailAndPassword(auth, email, pass);
        }
      } catch(e) { alert("Error: " + e.message); }
    };

    window.handleLogout = async () => {
      try {
        if (unsubscribeGarden) unsubscribeGarden();
        await signOut(auth);
        document.getElementById('canvasWorkspace').innerHTML = '<div id="centerAnchor"></div>';
        document.getElementById('emailInput').value = '';
        document.getElementById('passInput').value = '';
        document.getElementById('passConfirmInput').value = '';
        window.setAuthMode('login');
        window.showScreen('landingScreen');
      } catch(e) { alert("Logout failed: " + e.message); }
    };

    onAuthStateChanged(auth, (user) => {
      if (user) {
        if (unsubscribeGarden) unsubscribeGarden();
        unsubscribeGarden = onSnapshot(doc(db, "gardens", user.uid), (docSnap) => {
          if (docSnap.exists()) {
            const data = docSnap.data();
            window.applyGardenData(data);
          } else {
            window.showScreen('gardenScreen');
          }
        });
        window.showScreen('gardenScreen');
      } else {
        window.showScreen('landingScreen');
      }
    });

    window.saveGardenToFirebase = async (silent = false) => {
      const user = auth.currentUser;
      if (user) {
        const vegDataMap = {};
        document.querySelectorAll('.garden-veg-container').forEach(el => {
          const id = el.dataset.id;
          if (id) {
            vegDataMap[id] = {
              plantedDate: el.dataset.plantedDate || "",
              growDays: el.dataset.growDays || "",
              type: el.dataset.type || ""
            };
          }
        });

        const workspace = document.getElementById('canvasWorkspace');
        const clones = workspace.cloneNode(true);
        clones.querySelectorAll('.is-selected').forEach(c => c.classList.remove('is-selected'));

        await setDoc(doc(db, "gardens", user.uid), { 
          content: clones.innerHTML,
          vegetablesData: vegDataMap,
          language: window.currentLang
        }, { merge: true });
        if (!silent) alert(window.getI18n('alertSaved'));
      }
    };

    window.saveHarvestToFirebase = async (harvestEntry) => {
      const user = auth.currentUser;
      if (user) {
        await updateDoc(doc(db, "gardens", user.uid), {
          harvests: arrayUnion(harvestEntry)
        });
      }
    };

    window.removeHarvestFromFirebase = async (harvestId) => {
      const user = auth.currentUser;
      if (user) {
        const docRef = doc(db, "gardens", user.uid);
        const docSnap = await getDoc(docRef);
        if (docSnap.exists()) {
          const harvests = docSnap.data().harvests || [];
          const updatedHarvests = harvests.filter(h => h.id !== harvestId);
          await updateDoc(docRef, { harvests: updatedHarvests });
        }
      }
    };

    window.removeAllHarvestsFromFirebase = async () => {
      const user = auth.currentUser;
      if (user) {
        await updateDoc(doc(db, "gardens", user.uid), { harvests: [] });
      }
    };

    window.saveLanguageToFirebase = async (lang) => {
      const user = auth.currentUser;
      if (user) {
        try {
          await updateDoc(doc(db, "gardens", user.uid), { language: lang });
        } catch (e) {
          await setDoc(doc(db, "gardens", user.uid), { language: lang }, { merge: true });
        }
      }
    };

    window.applyGardenData = (data) => {
        if (data.language && data.language !== window.currentLang) {
          window.setLanguage(data.language, false);
        }

        window.userHarvests = data.harvests || [];

        if (!window.isBuildingModeActive) {
            const workspace = document.getElementById('canvasWorkspace');
            workspace.innerHTML = data.content || '<div id="centerAnchor"></div>';
            
            const vegDataMap = data.vegetablesData || {};
            
            workspace.querySelectorAll('.garden-veg-container').forEach(el => {
              const id = el.dataset.id;
              if (id && vegDataMap[id]) {
                el.dataset.plantedDate = vegDataMap[id].plantedDate || "";
                el.dataset.growDays = vegDataMap[id].growDays || "";
              }
              window.makeVegInteractive(el);
              const type = el.dataset.type;
              const labelSpan = el.querySelector('span');
              if (labelSpan && type) {
                labelSpan.innerText = window.getI18n(type);
              }
            });
            
            workspace.querySelectorAll('.garden-line-container').forEach(c => {
              window.makeLineInteractive(c, c.querySelector('.garden-line'));
            });
        }
        
        if(!document.getElementById('harvestScreen').classList.contains('hidden')) {
            window.populateHarvestDiary();
        }
        if(!document.getElementById('todayScreen').classList.contains('hidden')) {
            window.populateTodayScreen();
        }
    };
  </script>
<!-- END: Firebase & Auth Logic -->

      window.saveLanguageToFirebase(lang);
    }
    
    updateUI();
  };

    if (!key) return "";
    return translations[window.currentLang][key] || key;
  };

  function updateUI() {
    document.querySelectorAll('[data-i18n]').forEach(el => {
      const key = el.getAttribute('data-i18n');
      if (el.tagName === 'INPUT') {

    window.populateTodayScreen = function() {
      const content = document.getElementById('todayContent');
      const header = document.getElementById('todayHeader');
      content.innerHTML = '';
      
      const now = new Date();
      now.setHours(0,0,0,0);
      const options = { day: 'numeric', month: 'long' };
      header.innerText = window.getI18n('todayHeader') + now.toLocaleDateString(window.currentLang === 'nl' ? 'nl-NL' : 'en-GB', options);

      const readyHarvest = [];
      const waterNeed = [];
      const soonHarvest = [];

      const gardenItems = workspace.querySelectorAll('.garden-veg-container');
      
      if (gardenItems.length === 0) {
        content.innerHTML = `<div class="flex flex-col items-center justify-center py-20 px-8 text-center space-y-4">
          <div class="bg-neutral-50 p-6 rounded-full border border-neutral-100 shadow-sm">
            <svg class="w-12 h-12 text-neutral-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332-4.5 1.253"></path></svg>
          </div>
          <p class="text-neutral-500 font-medium leading-relaxed">${window.getI18n('emptyGardenTasks')}</p>
        </div>`;
        return;
      }

      gardenItems.forEach(el => {
        const type = el.dataset.type;
        const plantedDateStr = el.dataset.plantedDate;
        const growDays = parseInt(el.dataset.growDays);
        
        if (plantedDateStr && growDays) {
          const plantedDate = new Date(plantedDateStr);
          plantedDate.setHours(0,0,0,0);
          const diffTime = now - plantedDate;
          const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
          const daysLeft = growDays - diffDays;
          
          if (daysLeft <= 0) {
            readyHarvest.push({ type, label: `${window.getI18n(type)} ${window.getI18n('harvestReadyDesc')}` });
          } else if (daysLeft <= 10) {
            soonHarvest.push({ type, label: `${window.getI18n(type)} ${window.getI18n('harvestableIn')} ${daysLeft} ${window.getI18n('days')}` });
          }
          
          const vegInfo = vegLibraryData.find(v => v.id === type);
          if (vegInfo && (vegInfo.water === 'Daily' || vegInfo.water === 'High')) {
            waterNeed.push({ type, label: window.getI18n(type) });
          }

      });

      const renderSection = (titleKey, icon, items) => {
        if (items.length === 0) return '';
        let listHtml = items.map(item => `

            <div class="shrink-0 scale-[0.4] w-10 h-10 flex items-center justify-center">${document.getElementById('tmpl-'+item.type).innerHTML}</div>
            <span class="text-sm font-medium text-neutral-800">${item.label}</span>
          </div>
        `).join('');

        return `
          <section>
            <div class="flex items-center gap-2 mb-3">
              <span class="text-xl">${icon}</span>
              <h3 class="text-xs font-bold text-neutral-400 uppercase tracking-widest">${window.getI18n(titleKey)}</h3>
            </div>
            ${listHtml}
          </section>
        `;
      };

      let finalHtml = '';
      finalHtml += renderSection('readyToHarvest', '🥕', readyHarvest);
      finalHtml += renderSection('wateringList', '💧', waterNeed);
      finalHtml += renderSection('comingSoon', '⏳', soonHarvest);

      if (finalHtml === '') {
        content.innerHTML = `<div class="text-center py-20 px-8">
           <p class="text-neutral-400 font-medium">${window.getI18n('noTasksToday') || "No tasks for today."}</p>

      } else {

      }

    function handleCanvasClick(clientX, clientY, eventTarget) {
      if (!window.isBuildingModeActive) return;
      if (eventTarget.closest('.garden-veg-container') || eventTarget.closest('.garden-line-container') || eventTarget.closest('.stretch-handle')) return;
      if (currentSelectedElement) { clearSelection(); setMode('drag'); return; }

      const rect = container.getBoundingClientRect();
      const x = (clientX - rect.left - translateX) / window.scale;
      const y = (clientY - rect.top - translateY) / window.scale;

      if (activeMode === 'add') placeLineAt(x, y);
      else if (activeMode === 'add-veg' && selectedVegType) placeVegAt(x, y, selectedVegType);

    window.calculateHarvestDate = function() {
      const pDateInput = document.getElementById('inputPlantedDate').value;
      const gDaysInput = document.getElementById('inputGrowDays').value;
      const gDays = parseInt(gDaysInput);
      const out = document.getElementById('outputHarvestDate');
      const progressBar = document.getElementById('growthProgressBar');
      const progressText = document.getElementById('growthProgressText');
      
      if (pDateInput && !isNaN(gDays) && gDays > 0) {
        const plantedDate = new Date(pDateInput);
        const harvestDate = new Date(plantedDate);
        harvestDate.setDate(harvestDate.getDate() + gDays);
        out.value = harvestDate.toLocaleDateString(window.currentLang === 'nl' ? 'nl-NL' : 'en-GB');

        const today = new Date();
        const progress = Math.min(100, Math.max(0, Math.round((today - plantedDate) / (gDays * 86400000) * 100)));
        
        progressBar.style.width = progress + '%';
        progressText.innerText = progress + '%';
      } else {
        out.value = "";
        progressBar.style.width = '0%';
        progressText.innerText = '0%';
      }
    };

    window.makeLineInteractive = function(containerEl, lineEl) {
      let isDragging = false, isTransforming = false;
      let startX, startY, startLeft, startTop, startAngleInitial, startElementAngle;
      let centerX, centerY;

      containerEl.onpointerdown = (e) => {
        if (!window.isBuildingModeActive) return;
        e.stopPropagation();
        if (activeMode === 'remove') { containerEl.remove(); return; }
        clearSelection();
        currentSelectedElement = containerEl;
        currentSelectedElement.classList.add('is-selected');

        if (e.target.classList.contains('stretch-handle')) {
          isTransforming = true;
          const rect = containerEl.getBoundingClientRect();
          centerX = rect.left;
          centerY = rect.top;
          startElementAngle = parseFloat(containerEl.dataset.rotation || 0);
          startAngleInitial = Math.atan2(e.clientY - centerY, e.clientX - centerX) * (180 / Math.PI);
        } else {
          isDragging = true;
          startX = e.clientX; startY = e.clientY;
          startLeft = parseInt(containerEl.style.left); startTop = parseInt(containerEl.style.top);
        }
        containerEl.setPointerCapture(e.pointerId);
      };

      containerEl.onpointermove = (e) => {
        if (isDragging) {
          containerEl.style.left = `${startLeft + (e.clientX - startX) / window.scale}px`;
          containerEl.style.top = `${startTop + (e.clientY - startY) / window.scale}px`;
        } else if (isTransforming) {
          const currentMouseAngle = Math.atan2(e.clientY - centerY, e.clientX - centerX) * (180 / Math.PI);
          let deltaAngle = currentMouseAngle - startAngleInitial;
          let deg = startElementAngle + deltaAngle;
          const snap = 22.5;
          deg = Math.round(deg / snap) * snap;
          containerEl.style.transform = `rotate(${deg}deg)`;
          containerEl.dataset.rotation = deg;
          const dist = Math.hypot(e.clientX - centerX, e.clientY - centerY) / window.scale;
          lineEl.style.width = `${Math.max(15, dist)}px`;
        }
      };

      containerEl.onpointerup = (e) => { isDragging = isTransforming = false; containerEl.releasePointerCapture(e.pointerId); };
    };

    window.makeVegInteractive = function(vegEl) {
      let isDragging = false, moved = false, startX, startY, startLeft, startTop;

      vegEl.onpointerdown = (e) => {
        e.stopPropagation();
        if (window.isBuildingModeActive && activeMode === 'remove') { 
          vegEl.remove(); 
          return; 
        }
        clearSelection();
        currentSelectedElement = vegEl;
        currentSelectedElement.classList.add('is-selected');
        
        moved = false;
        startX = e.clientX; startY = e.clientY;
        startLeft = parseInt(vegEl.style.left); startTop = parseInt(vegEl.style.top);
        
        if (window.isBuildingModeActive) {
          isDragging = true;
          vegEl.setPointerCapture(e.pointerId);
        }
      };

      vegEl.onpointermove = (e) => {
        if (!isDragging) {
            const dx = (e.clientX - (startX||0));
            const dy = (e.clientY - (startY||0));
            if (Math.abs(dx) > 5 || Math.abs(dy) > 5) moved = true;
            return;
        }
        const dx = (e.clientX - startX) / window.scale;
        const dy = (e.clientY - startY) / window.scale;
        if (Math.abs(dx) > 3 || Math.abs(dy) > 3) moved = true; 
        vegEl.style.left = `${startLeft + dx}px`;
        vegEl.style.top = `${startTop + dy}px`;
      };

      vegEl.onpointerup = (e) => {
        if (isDragging) {
            isDragging = false; 
            vegEl.releasePointerCapture(e.pointerId);
        }
        if (!moved && activeMode !== 'remove') {
            window.openVegDetails(vegEl);
        }
      };
    };

    function updateWorkspaceTransform() {
      workspace.style.transform = `translate(${translateX}px, ${translateY}px) scale(${window.scale})`;
      const zBadge = document.getElementById('zoomBadge');
      if (zBadge) zBadge.innerText = `${window.getI18n('zoom')}: ${Math.round(window.scale * 100)}%`;
    }

    window.resetGardenView = function() {
      const containerRect = container.getBoundingClientRect();
      window.scale = 0.8;
      // Centering on 1000, 1000
      translateX = (containerRect.width / 2) - (1000 * window.scale);
      translateY = (containerRect.height / 2) - (1000 * window.scale);
      updateWorkspaceTransform();
    };

    function initGardenInteractions() {
      let lastX, lastY, isPanning = false, startDist = 0, initialScale = 1;

      container.onpointerdown = (e) => {
        if (e.target.closest('.garden-veg-container') || e.target.closest('.garden-line-container') || e.target.closest('.stretch-handle')) return;
        isPanning = true;
        lastX = e.clientX;
        lastY = e.clientY;
        container.setPointerCapture(e.pointerId);
      };

      container.onpointermove = (e) => {
        if (!isPanning) return;
        const dx = e.clientX - lastX;
        const dy = e.clientY - lastY;
        translateX += dx;
        translateY += dy;
        lastX = e.clientX;
        lastY = e.clientY;
        updateWorkspaceTransform();
      };

      container.onpointerup = (e) => {
        isPanning = false;
        container.releasePointerCapture(e.pointerId);
      };

      container.addEventListener('touchstart', (e) => {
        if (e.touches.length === 2) {
          isPanning = false;
          startDist = Math.hypot(e.touches[0].pageX - e.touches[1].pageX, e.touches[0].pageY - e.touches[1].pageY);
          initialScale = window.scale;
        }
      }, { passive: true });

      container.addEventListener('touchmove', (e) => {
        if (e.touches.length === 2 && startDist > 0) {
          const d = Math.hypot(e.touches[0].pageX - e.touches[1].pageX, e.touches[0].pageY - e.touches[1].pageY);
          const ratio = d / startDist;
          const oldScale = window.scale;
          window.scale = Math.max(0.2, Math.min(4, initialScale * ratio));
          const rect = container.getBoundingClientRect();
          const centerX = rect.width / 2;
          const centerY = rect.height / 2;
          translateX = centerX - (centerX - translateX) * (window.scale / oldScale);
          translateY = centerY - (centerY - translateY) * (window.scale / oldScale);
          updateWorkspaceTransform();
        }
      }, { passive: true });

      container.addEventListener('click', (e) => {
          handleCanvasClick(e.clientX, e.clientY, e.target);
      });
    }

    window.addEventListener('DOMContentLoaded', () => {
      initGardenInteractions();
      updateUI();
      window.resetGardenView();
    });
  </script>
<!-- END: Application Scripts -->
</body></html>
