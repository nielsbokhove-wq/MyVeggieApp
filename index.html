<style data-purpose="branding-colors">
    :root {
      --bladgroen: #4CAF50;
    }
    .text-bladgroen { color: var(--bladgroen); }
    .bg-bladgroen { background-color: var(--bladgroen); }
    .fill-bladgroen { fill: var(--bladgroen); }
    .border-bladgroen { border-color: var(--bladgroen); }
  </style>
<style data-purpose="canvas-layout">
    #canvasWorkspace {
      position: absolute;
      width: 2000px;
      height: 2000px;
      top: 0;
      left: 0;
      transform-origin: 0 0;
      background-color: #fdfaf5;
      background-image: radial-gradient(#e5e7eb 1px, transparent 1px);
      background-size: 40px 40px;
      touch-action: none;
    }

    #centerAnchor {
      position: absolute;
      left: 1000px;
      top: 1000px;
      width: 8px;
      height: 8px;
      background-color: #d1d5db;
      border-radius: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      z-index: 5;
    }

    .garden-line-container {
      position: absolute;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: flex-start;
      touch-action: none;
      transform-origin: 0px 20px;
      padding-right: 20px;
    }

    .garden-veg-container {
      position: absolute;
      width: 120px;
      height: 130px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      touch-action: none;
      z-index: 20;
      filter: drop-shadow(0 8px 12px rgba(0,0,0,0.25));
      transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    
    .garden-veg-container svg {
      filter: drop-shadow(0 2px 2px rgba(0,0,0,0.1));
      transform: perspective(500px) rotateX(10deg);
    }

    .garden-veg-container:active {
      transform: scale(1.1) rotate(2deg);
      filter: drop-shadow(0 12px 20px rgba(0,0,0,0.3));
    }

    .garden-line {
      height: 10px;
      background: linear-gradient(to bottom, #8d6e63 0%, #795548 50%, #5d4037 100%);
      border-radius: 4px;
      pointer-events: none;
      box-shadow: 0 4px 4px rgba(0,0,0,0.3), inset 0 1px 1px rgba(255,255,255,0.2);
    }

    .stretch-handle {
      position: absolute;
      right: 0px; 
      width: 16px;
      height: 16px;
      background-color: #ffffff;
      border-radius: 50%;
      cursor: ew-resize;
      display: none;
      z-index: 30;
      box-shadow: 0 2px 6px rgba(0,0,0,0.2);
      border: 1px solid #e5e7eb;
    }
    
    .is-building .stretch-handle {
      display: block;
    }
    
    .is-selected {
      outline: 2px dashed #4CAF50;
      outline-offset: 4px;
    }

    .is-building .garden-line-container, 
    .is-building .garden-veg-container {
      cursor: move;
    }

    #libraryList::-webkit-scrollbar, #harvestList::-webkit-scrollbar, #vegSubMenu::-webkit-scrollbar {
      width: 4px;
    }
    #libraryList::-webkit-scrollbar-track, #harvestList::-webkit-scrollbar-track, #vegSubMenu::-webkit-scrollbar-track {
      background: #f3f4f6;
    }
    #libraryList::-webkit-scrollbar-thumb, #harvestList::-webkit-scrollbar-thumb, #vegSubMenu::-webkit-scrollbar-thumb {
      background: #d1d5db;
      border-radius: 10px;
    }
    
    .library-accordion-content {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.3s ease-out;
    }
    .library-accordion-item.active .library-accordion-content {
      max-height: 1200px;
      transition: max-height 0.5s ease-in;
    }
    .library-accordion-item.active .chevron-icon {
      transform: rotate(180deg);
    }
  </style>
<style>#vegSubMenu span { font-size: 0.75rem !important; line-height: 1rem !important; padding-top: 4px; }</style>
</head>
<body class="bg-white text-neutral-900 min-h-screen flex flex-col font-sans touch-none select-none overflow-hidden">
<!-- BEGIN: Firebase & Auth Logic -->
<script data-purpose="firebase-setup" type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, doc, setDoc, getDoc, updateDoc, arrayUnion, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyByW25sPnpfCiuJobldmAdglpvqSTVkauY",
      authDomain: "myveggieapp-859a6.firebaseapp.com",
      projectId: "myveggieapp-859a6",
      storageBucket: "myveggieapp-859a6.firebasestorage.app",
      messagingSenderId: "20511651208",
      appId: "1:20511651208:web:eda2073c4bd2699d1af63d"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    let unsubscribeGarden = null;

    window.handleAuth = async (mode) => {
      const email = document.getElementById('emailInput').value;
      const pass = document.getElementById('passInput').value;
      
      if(!email || !pass) return alert(window.getI18n('alertFillEmail'));
      
      if(mode === 'register') {
        const passConfirm = document.getElementById('passConfirmInput').value;
        if(pass !== passConfirm) {
          return alert(window.getI18n('alertPassMismatch'));
        }
      }
      
      try {
        if(mode === 'login') {
          await signInWithEmailAndPassword(auth, email, pass);
        } else {
          await createUserWithEmailAndPassword(auth, email, pass);
        }
      } catch(e) { alert("Error: " + e.message); }
    };

    window.handleLogout = async () => {
      try {
        if (unsubscribeGarden) unsubscribeGarden();
        await signOut(auth);
        document.getElementById('canvasWorkspace').innerHTML = '<div id="centerAnchor"></div>';
        document.getElementById('emailInput').value = '';
        document.getElementById('passInput').value = '';
        document.getElementById('passConfirmInput').value = '';
        window.setAuthMode('login');
        window.showScreen('landingScreen');
      } catch(e) { alert("Logout failed: " + e.message); }
    };

    onAuthStateChanged(auth, (user) => {
      if (user) {
        if (unsubscribeGarden) unsubscribeGarden();
        unsubscribeGarden = onSnapshot(doc(db, "gardens", user.uid), (docSnap) => {
          if (docSnap.exists()) {
            const data = docSnap.data();
            window.applyGardenData(data);
          } else {
            window.showScreen('gardenScreen');
          }
        });
        window.showScreen('gardenScreen');
      } else {
        window.showScreen('landingScreen');
      }
    });

    window.saveGardenToFirebase = async (silent = false) => {
      const user = auth.currentUser;
      if (user) {
        const vegDataMap = {};
        document.querySelectorAll('.garden-veg-container').forEach(el => {
          const id = el.dataset.id;
          if (id) {
            vegDataMap[id] = {
              plantedDate: el.dataset.plantedDate || "",
              growDays: el.dataset.growDays || "",
              type: el.dataset.type || "",
              customName: el.dataset.customName || ""
            };
          }
        });

        const workspace = document.getElementById('canvasWorkspace');
        const clones = workspace.cloneNode(true);
        clones.querySelectorAll('.is-selected').forEach(c => c.classList.remove('is-selected'));

        await setDoc(doc(db, "gardens", user.uid), { 
          content: clones.innerHTML,
          vegetablesData: vegDataMap,
          language: window.currentLang
        }, { merge: true });
        if (!silent) alert(window.getI18n('alertSaved'));
      }
    };

    window.saveHarvestToFirebase = async (harvestEntry) => {
      const user = auth.currentUser;
      if (user) {
        await updateDoc(doc(db, "gardens", user.uid), {
          harvests: arrayUnion(harvestEntry)
        });
      }
    };

    window.removeHarvestFromFirebase = async (harvestId) => {
      const user = auth.currentUser;
      if (user) {
        const docRef = doc(db, "gardens", user.uid);
        const docSnap = await getDoc(docRef);
        if (docSnap.exists()) {
          const harvests = docSnap.data().harvests || [];
          const updatedHarvests = harvests.filter(h => h.id !== harvestId);
          await updateDoc(docRef, { harvests: updatedHarvests });
        }
      }
    };

    window.removeAllHarvestsFromFirebase = async () => {
      const user = auth.currentUser;
      if (user) {
        await updateDoc(doc(db, "gardens", user.uid), { harvests: [] });
      }
    };

    window.saveLanguageToFirebase = async (lang) => {
      const user = auth.currentUser;
      if (user) {
        try {
          await updateDoc(doc(db, "gardens", user.uid), { language: lang });
        } catch (e) {
          await setDoc(doc(db, "gardens", user.uid), { language: lang }, { merge: true });
        }
      }
    };

    window.applyGardenData = (data) => {
        if (data.language && data.language !== window.currentLang) {
          window.setLanguage(data.language, false);
        }

        window.userHarvests = data.harvests || [];

        if (!window.isBuildingModeActive) {
            const workspace = document.getElementById('canvasWorkspace');
            workspace.innerHTML = data.content || '<div id="centerAnchor"></div>';
            
            const vegDataMap = data.vegetablesData || {};
            
            workspace.querySelectorAll('.garden-veg-container').forEach(el => {
              const id = el.dataset.id;
              if (id && vegDataMap[id]) {
                el.dataset.plantedDate = vegDataMap[id].plantedDate || "";
                el.dataset.growDays = vegDataMap[id].growDays || "";
                el.dataset.customName = vegDataMap[id].customName || "";
              }
              window.makeVegInteractive(el);
              const type = el.dataset.type;
              const labelSpan = el.querySelector('span');
              if (labelSpan && type) {
                if (type === 'custom' && el.dataset.customName) {
                  labelSpan.innerText = el.dataset.customName;
                } else {
                  labelSpan.innerText = window.getI18n(type);
                }
              }
            });
            
            workspace.querySelectorAll('.garden-line-container').forEach(c => {
              window.makeLineInteractive(c, c.querySelector('.garden-line'));
            });
        }
        
        if(!document.getElementById('harvestScreen').classList.contains('hidden')) {
            window.populateHarvestDiary();
        }
        if(!document.getElementById('todayScreen').classList.contains('hidden')) {
            window.populateTodayScreen();
        }
    };
  </script>
<!-- END: Firebase & Auth Logic -->

  function addBulkTranslation(id, en, nl) {
    translations.en[id] = en;
    translations.nl[id] = nl;
  }

  window.currentLang = 'en';

  window.setLanguage = function(lang, saveToCloud = true) {
    window.currentLang = lang;
    document.documentElement.lang = lang;
    if (saveToCloud && window.saveLanguageToFirebase) window.saveLanguageToFirebase(lang);
    updateUI();
  };

  window.getI18n = function(key) {
    if (!key) return "";
    return translations[window.currentLang][key] || key;
  };

  function updateUI() {
    document.querySelectorAll('[data-i18n]').forEach(el => {
      const key = el.getAttribute('data-i18n');
      if (el.tagName === 'INPUT') el.placeholder = getI18n(key);
      else el.innerText = getI18n(key);
    });

    const gTitle = document.getElementById('gardenTitle');
    if(gTitle && gTitle.getAttribute('data-key')) gTitle.innerText = getI18n(gTitle.getAttribute('data-key'));

    const zBadge = document.getElementById('zoomBadge');
    if (zBadge) zBadge.innerText = `${getI18n('zoom')}: ${Math.round((window.scale || 0.8) * 100)}%`;

    document.querySelectorAll('.garden-veg-container').forEach(el => {

      const labelSpan = el.querySelector('span');

      }
    });

    const btnNed = document.getElementById('btnNed');

      const regField = document.getElementById('registerFieldContainer'), loginActions = document.getElementById('loginModeActions'), registerActions = document.getElementById('registerModeActions');
      if(mode === 'register') { regField.classList.remove('hidden'); loginActions.classList.add('hidden'); registerActions.classList.remove('hidden'); }
      else { regField.classList.add('hidden'); loginActions.classList.remove('hidden'); registerActions.classList.add('hidden'); }
    };

    window.toggleMenu = function(open) {
      const menu = document.getElementById('hamburgerMenu');
      if (open) menu.classList.remove('hidden'); else menu.classList.add('hidden');
    };

    window.selectMenuOption = function(key) {
      toggleMenu(false);
      if(key === 'settings') { showScreen('settingsScreen'); return; }
      if(key === 'vegLibrary') { showScreen('libraryScreen'); return; }
      if(key === 'harvestRegistration') { showScreen('harvestScreen'); return; }
      if(key === 'today') { showScreen('todayScreen'); return; }
      const gTitle = document.getElementById('gardenTitle');
      gTitle.setAttribute('data-key', key);
      gTitle.innerText = window.getI18n(key);
      if (key === 'buildGarden') unlockGarden(); else lockGarden();
    };

    function lockGarden() {
      window.isBuildingModeActive = false;
      container.classList.remove('is-building');
      document.getElementById('buildControls').classList.add('hidden');
      document.getElementById('vegSubMenu').classList.add('hidden');
      clearSelection(); setMode('drag');
    }

    function unlockGarden() {
      window.isBuildingModeActive = true;
      container.classList.add('is-building');
      document.getElementById('buildControls').classList.remove('hidden');
      gardenBackup = workspace.innerHTML;
      setMode('drag'); window.populateVegMenu();
    }

    function setMode(mode) {
      activeMode = mode;
      document.getElementById('vegSubMenu').classList.add('hidden');
      ['addBtn', 'addVegBtn', 'removeBtn', 'duplicateBtn'].forEach(id => {
        const btn = document.getElementById(id);
        if(btn) btn.className = "bg-white border border-neutral-200 text-neutral-900 font-bold py-4 rounded-xl text-[9px] uppercase tracking-wider transition-all";
      });
      if (mode === 'add') { document.getElementById('addBtn').classList.replace('border-neutral-200', 'border-bladgroen'); document.getElementById('addBtn').classList.add('text-bladgroen'); }
      else if (mode === 'veg-menu') { document.getElementById('addVegBtn').classList.replace('border-neutral-200', 'border-bladgroen'); document.getElementById('addVegBtn').classList.add('text-bladgroen'); document.getElementById('vegSubMenu').classList.remove('hidden'); }
      else if (mode === 'remove') { document.getElementById('removeBtn').classList.replace('border-neutral-200', 'border-red-500'); document.getElementById('removeBtn').classList.add('text-red-500'); clearSelection(); }
    }

    function getVegSVG(vegId) {
      const tmpl = document.getElementById(`tmpl-${vegId}`);
      if (tmpl) return tmpl.innerHTML;
      const veg = vegLibraryData.find(v => v.id === vegId);
      const category = veg ? veg.category : 'herb';
      let fallbackId = 'tmpl-generic-leaf';
      let color = '#4CAF50';
      if (category === 'root') { fallbackId = 'tmpl-generic-root'; color = '#8D6E63'; }
      else if (category === 'fruit_veg') { color = '#F44336'; }
      else if (category === 'herb') { color = '#8BC34A'; }
      let svgHtml = document.getElementById(fallbackId).innerHTML;
      return svgHtml.replace('currentColor', color);
    }

    window.populateVegMenu = function() {
      const menu = document.getElementById('vegSubMenu'); menu.innerHTML = '';
      
      // 1. Add Custom option at the very beginning
      const createVegBtn = (vegId) => {
        const btn = document.createElement('button');
        btn.onclick = () => selectVeg(vegId);
        btn.className = "flex flex-col items-center gap-1 p-3 rounded-xl bg-white border border-neutral-100 hover:border-bladgroen transition-colors shadow-sm";
        btn.innerHTML = `<div class="scale-50 h-10 flex items-center justify-center">${getVegSVG(vegId)}</div><span class="text-[9px] truncate w-full text-center text-neutral-500 font-medium">${window.getI18n(vegId)}</span>`;
        return btn;
      };
      
      menu.appendChild(createVegBtn('custom'));

      // 2. Add the rest sorted alphabetically
      const sorted = [...vegLibraryData]
        .filter(v => v.id !== 'custom')
        .sort((a,b) => window.getI18n(a.id).localeCompare(window.getI18n(b.id)));
        
      sorted.forEach(veg => {
        menu.appendChild(createVegBtn(veg.id));
      });
    };

    window.populateLibrary = function() {
      const list = document.getElementById('libraryList'); list.innerHTML = '';
      const months = ['jan','feb','mar','apr','may','jun','jul','aug','sep','oct','nov','dec'];
      const sortedData = [...vegLibraryData].sort((a, b) => window.getI18n(a.id).localeCompare(window.getI18n(b.id)));
      sortedData.forEach(veg => {
        const accordionItem = document.createElement('div');
        accordionItem.className = "library-accordion-item bg-neutral-50 border border-neutral-100 rounded-2xl overflow-hidden mb-3 shadow-sm";
        const renderRow = (label, value) => `<div class="flex justify-between items-center text-sm py-1"><span class="text-neutral-500 font-medium">${window.getI18n(label)}</span><span class="text-neutral-900 font-bold">${window.getI18n(value)}</span></div>`;
        const renderCalRow = (labelKey, activeMonths) => {
            let cells = '', labels = '';
            months.forEach((m, i) => { cells += `<div class="w-full h-4 flex items-center justify-center rounded-sm ${activeMonths.includes(i+1) ? 'bg-bladgroen' : 'bg-neutral-200'}"></div>`; labels += `<div class="w-full text-center text-[10px] font-bold text-neutral-400 uppercase tracking-tighter">${window.getI18n(m)}</div>`; });
            return `<div class="space-y-1.5 mb-4"><span class="text-xs text-neutral-400 font-bold uppercase tracking-wider">${window.getI18n(labelKey)}</span><div class="grid grid-cols-12 gap-1 mb-1">${cells}</div><div class="grid grid-cols-12 gap-1">${labels}</div></div>`;
        };
        accordionItem.innerHTML = `
          <button class="w-full flex items-center justify-between p-5 focus:outline-none bg-neutral-50 active:bg-neutral-100 transition-colors" onclick="this.parentElement.classList.toggle('active')">
            <div class="flex items-center gap-4"><div class="bg-white p-1 rounded-lg border border-neutral-100 scale-50 w-12 h-12 flex items-center justify-center shadow-sm">${getVegSVG(veg.id)}</div><h3 class="text-lg font-bold text-neutral-900">${window.getI18n(veg.id)}</h3></div>
            <svg class="chevron-icon w-6 h-6 stroke-neutral-400 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
          </button>
          <div class="library-accordion-content bg-white"><div class="p-5 pt-2 space-y-5"><div class="space-y-1 border-t border-neutral-100 pt-5">${renderRow('growDays', (veg.growTime || '60') + ' days')}${renderRow('expectedHarvest', veg.expectedHarvest)}${renderRow('sunlight', veg.sun)}${renderRow('watering', veg.water)}${renderRow('illnesses', veg.illnesses)}</div><div class="pt-3 border-t border-neutral-100 space-y-4"><h4 class="text-xs font-bold text-bladgroen uppercase tracking-widest border-b border-bladgroen/10 pb-2">${window.getI18n('calendar')}</h4>${renderCalRow('greenhouse', veg.calendar.greenhouse)}${renderCalRow('outside', veg.calendar.outside)}${renderCalRow('atHome', veg.calendar.home)}</div></div></div>`;
        list.appendChild(accordionItem);
      });
    };

    window.populateTodayScreen = function() {
      const content = document.getElementById('todayContent'), header = document.getElementById('todayHeader');
      content.innerHTML = '';
      const now = new Date(); now.setHours(0,0,0,0);
      header.innerText = window.getI18n('todayHeader') + now.toLocaleDateString(window.currentLang === 'nl' ? 'nl-NL' : 'en-GB', { day: 'numeric', month: 'long' });
      const readyHarvest = [], waterNeed = [], soonHarvest = [];
      const gardenItems = workspace.querySelectorAll('.garden-veg-container');
      if (gardenItems.length === 0) {
        content.innerHTML = `<div class="flex flex-col items-center justify-center py-20 px-8 text-center space-y-4"><div class="bg-neutral-50 p-6 rounded-full border border-neutral-100 shadow-sm"><svg class="w-12 h-12 text-neutral-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332-4.5 1.253"></path></svg></div><p class="text-neutral-500 font-medium leading-relaxed">${window.getI18n('emptyGardenTasks')}</p></div>`;
        return;
      }
      gardenItems.forEach(el => {
        const type = el.dataset.type, plantedDateStr = el.dataset.plantedDate, growDays = parseInt(el.dataset.growDays), cName = el.dataset.customName;
        if (plantedDateStr && growDays) {
          const plantedDate = new Date(plantedDateStr); plantedDate.setHours(0,0,0,0);
          const diffTime = now - plantedDate; const diffDays = Math.ceil(diffTime / 86400000), daysLeft = growDays - diffDays;
          const displayLabel = type === 'custom' ? (cName || window.getI18n('custom')) : window.getI18n(type);
          if (daysLeft <= 0) readyHarvest.push({ type, label: `${displayLabel} ${window.getI18n('harvestReadyDesc')}` });
          else if (daysLeft <= 10) soonHarvest.push({ type, label: `${displayLabel} ${window.getI18n('harvestableIn')} ${daysLeft} ${window.getI18n('days')}` });
          const vegInfo = vegLibraryData.find(v => v.id === type);
          if (vegInfo && (vegInfo.water === 'Daily' || vegInfo.water === 'High')) waterNeed.push({ type, label: displayLabel });
        }
      });
      const renderSection = (titleKey, icon, items) => {
        if (items.length === 0) return '';
        let listHtml = items.map(item => `<div class="flex items-center gap-3 p-3 bg-white border border-neutral-100 rounded-xl shadow-sm mb-2"><div class="shrink-0 scale-[0.4] w-10 h-10 flex items-center justify-center">${getVegSVG(item.type)}</div><span class="text-sm font-medium text-neutral-800">${item.label}</span></div>`).join('');
        return `<section><div class="flex items-center gap-2 mb-3"><span class="text-xl">${icon}</span><h3 class="text-xs font-bold text-neutral-400 uppercase tracking-widest">${window.getI18n(titleKey)}</h3></div>${listHtml}</section>`;
      };
      let finalHtml = renderSection('readyToHarvest', '🥕', readyHarvest) + renderSection('wateringList', '💧', waterNeed) + renderSection('comingSoon', '⏳', soonHarvest);
      content.innerHTML = finalHtml || `<div class="text-center py-20 px-8"><p class="text-neutral-400 font-medium">No tasks for today.</p></div>`;
    };

    window.populateHarvestDiary = function() {
      const list = document.getElementById('harvestList'); list.innerHTML = '';
      if (!window.userHarvests || window.userHarvests.length === 0) { list.innerHTML = `<div class="text-center py-10 text-neutral-400 font-medium">${window.getI18n('noHarvests')}</div>`; return; }
      [...window.userHarvests].sort((a, b) => new Date(b.date) - new Date(a.date)).forEach(h => {
        const item = document.createElement('div');
        item.className = "bg-neutral-50 border border-neutral-100 rounded-2xl p-4 flex items-center justify-between shadow-sm mb-3";
        item.innerHTML = `<div class="flex items-center gap-4 overflow-hidden"><div class="bg-white p-1 rounded-xl border border-neutral-100 shrink-0 scale-50 w-12 h-12 flex items-center justify-center shadow-sm">${getVegSVG(h.type)}</div><div class="truncate"><h4 class="font-bold text-neutral-900 truncate">${h.type === 'custom' ? (h.customName || window.getI18n('custom')) : window.getI18n(h.type)}</h4><p class="text-[10px] text-neutral-400 font-bold uppercase tracking-widest">${new Date(h.date).toLocaleDateString()}</p></div></div><div class="flex flex-col items-end gap-2 shrink-0 ml-4"><div class="text-right"><p class="text-sm font-bold text-bladgroen">${h.weight}</p></div><button class="text-[9px] font-bold text-red-500 border border-red-200 bg-white px-2 py-1 rounded-md uppercase hover:bg-red-50 transition-colors" onclick="confirmRemoveHarvest(event, '${h.id}')">${window.getI18n('remove')}</button></div>`;
        list.appendChild(item);
      });
    };

    window.confirmRemoveHarvest = async function(e, harvestId) { if (confirm(window.getI18n('confirmDeleteOne'))) await window.removeHarvestFromFirebase(harvestId); };
    window.confirmRemoveAllHarvests = async function(e) { if (confirm(window.getI18n('confirmDeleteAll'))) await window.removeAllHarvestsFromFirebase(); };

    window.doHarvest = async function() {
      if (!currentTargetVegElement) return;
      const weight = prompt(window.getI18n('promptWeight'), "");
      if (weight !== null && weight.trim() !== "") {
        const harvestEntry = { id: "h-" + Date.now(), type: currentTargetVegElement.dataset.type, customName: currentTargetVegElement.dataset.customName || "", date: new Date().toISOString(), weight: weight };
        if (window.saveHarvestToFirebase) await window.saveHarvestToFirebase(harvestEntry);
        currentTargetVegElement.remove();
        if (window.saveGardenToFirebase) await window.saveGardenToFirebase(true);
        closeVegDetails(); alert(window.getI18n('harvest') + " saved!");
      }
    };

    function selectVeg(vegType) {
      selectedVegType = vegType;
      activeMode = 'add-veg';
      document.getElementById('vegSubMenu').classList.add('hidden');
      document.getElementById('addVegBtn').className = "bg-white text-bladgroen font-bold py-4 rounded-xl text-[9px] border-2 border-bladgroen uppercase tracking-wider";
      clearSelection();
    }

    function clearSelection() { if (currentSelectedElement) { currentSelectedElement.classList.remove('is-selected'); currentSelectedElement = null; } }

    function handleCanvasClick(clientX, clientY, eventTarget) {
      if (!window.isBuildingModeActive) return;
      if (eventTarget.closest('.garden-veg-container') || eventTarget.closest('.garden-line-container') || eventTarget.closest('.stretch-handle')) return;
      if (currentSelectedElement) { clearSelection(); setMode('drag'); return; }
      const rect = container.getBoundingClientRect(), x = (clientX - rect.left - translateX) / window.scale, y = (clientY - rect.top - translateY) / window.scale;
      if (activeMode === 'add') placeLineAt(x, y); else if (activeMode === 'add-veg' && selectedVegType) placeVegAt(x, y, selectedVegType);
    }

    function placeLineAt(x, y) {
      const containerDiv = document.createElement('div'); containerDiv.className = 'garden-line-container';
      containerDiv.style.left = `${x}px`; containerDiv.style.top = `${y - 20}px`; containerDiv.dataset.rotation = 0;
      const lineDiv = document.createElement('div'); lineDiv.className = 'garden-line'; lineDiv.style.width = '38px';
      const handleDiv = document.createElement('div'); handleDiv.className = 'stretch-handle';
      containerDiv.appendChild(lineDiv); containerDiv.appendChild(handleDiv); workspace.appendChild(containerDiv);
      window.makeLineInteractive(containerDiv, lineDiv);
      currentSelectedElement = containerDiv; currentSelectedElement.classList.add('is-selected');
    }

    function placeVegAt(x, y, type) {
      let customName = "";
      if (type === 'custom') { customName = prompt(window.getI18n('promptCustomName')) || ""; }
      const vegDiv = document.createElement('div'); vegDiv.className = 'garden-veg-container';
      vegDiv.style.left = `${x - 60}px`; vegDiv.style.top = `${y - 65}px`;
      vegDiv.dataset.type = type; vegDiv.dataset.id = "id-" + Date.now();
      if (customName) vegDiv.dataset.customName = customName;
      const vegData = vegLibraryData.find(v => v.id === type);
      vegDiv.dataset.growDays = vegData ? vegData.growTime : "60";
      const display = (type === 'custom' && customName) ? customName : window.getI18n(type);
      vegDiv.innerHTML = `${getVegSVG(type)}<span class="text-[11px] text-neutral-600 mt-1 font-bold pointer-events-none text-center truncate w-full px-2">${display}</span>`;
      workspace.appendChild(vegDiv); window.makeVegInteractive(vegDiv);
      currentSelectedElement = vegDiv; currentSelectedElement.classList.add('is-selected');
    }

    window.openVegDetails = function(vegEl) {
      currentTargetVegElement = vegEl; const type = vegEl.dataset.type;
      document.getElementById('detailVegTitle').innerText = (type === 'custom' && vegEl.dataset.customName) ? vegEl.dataset.customName : window.getI18n(type);
      document.getElementById('detailVegIcon').innerHTML = `<div class="scale-[0.6]">${getVegSVG(type)}</div>`;
      document.getElementById('inputPlantedDate').value = vegEl.dataset.plantedDate || "";
      document.getElementById('inputGrowDays').value = vegEl.dataset.growDays || "";
      calculateHarvestDate(); showScreen('vegDetailScreen');
    };

    window.closeVegDetails = function() { showScreen('gardenScreen'); currentTargetVegElement = null; };

    window.saveVegDetails = async function() {
      if (currentTargetVegElement) {
        currentTargetVegElement.dataset.plantedDate = document.getElementById('inputPlantedDate').value;
        currentTargetVegElement.dataset.growDays = document.getElementById('inputGrowDays').value;
        if (window.saveGardenToFirebase) await window.saveGardenToFirebase(true);
      }
      closeVegDetails();
    };

    window.saveGarden = async function() {
      if(window.saveGardenToFirebase) await window.saveGardenToFirebase();
      const gTitle = document.getElementById('gardenTitle'); gTitle.setAttribute('data-key', 'viewGarden'); gTitle.innerText = window.getI18n('viewGarden');
      lockGarden();
    };

    window.cancelBuild = function() {
      if (gardenBackup) {
        workspace.innerHTML = gardenBackup;
        workspace.querySelectorAll('.garden-veg-container').forEach(el => window.makeVegInteractive(el));
        workspace.querySelectorAll('.garden-line-container').forEach(c => window.makeLineInteractive(c, c.querySelector('.garden-line')));
      }
      const gTitle = document.getElementById('gardenTitle'); gTitle.setAttribute('data-key', 'viewGarden'); gTitle.innerText = window.getI18n('viewGarden');
      lockGarden();
    };

    window.calculateHarvestDate = function() {
      const pDateInput = document.getElementById('inputPlantedDate').value, gDaysInput = document.getElementById('inputGrowDays').value, gDays = parseInt(gDaysInput), out = document.getElementById('outputHarvestDate'), bar = document.getElementById('growthProgressBar'), text = document.getElementById('growthProgressText');
      if (pDateInput && !isNaN(gDays) && gDays > 0) {
        const plantedDate = new Date(pDateInput), harvestDate = new Date(plantedDate); harvestDate.setDate(harvestDate.getDate() + gDays);
        out.value = harvestDate.toLocaleDateString(window.currentLang === 'nl' ? 'nl-NL' : 'en-GB');
        const progress = Math.min(100, Math.max(0, Math.round((new Date() - plantedDate) / (gDays * 86400000) * 100)));
        bar.style.width = progress + '%'; text.innerText = progress + '%';
      } else { out.value = ""; bar.style.width = '0%'; text.innerText = '0%'; }
    };

    window.makeLineInteractive = function(containerEl, lineEl) {
      let isDragging = false, isTransforming = false, startX, startY, startLeft, startTop, startAngleInitial, startElementAngle, centerX, centerY;
      containerEl.onpointerdown = (e) => {
        if (!window.isBuildingModeActive) return; e.stopPropagation();
        if (activeMode === 'remove') { containerEl.remove(); return; }
        clearSelection(); currentSelectedElement = containerEl; currentSelectedElement.classList.add('is-selected');
        if (e.target.classList.contains('stretch-handle')) {
          isTransforming = true; const rect = containerEl.getBoundingClientRect(); centerX = rect.left; centerY = rect.top;
          startElementAngle = parseFloat(containerEl.dataset.rotation || 0); startAngleInitial = Math.atan2(e.clientY - centerY, e.clientX - centerX) * (180 / Math.PI);
        } else {
          isDragging = true; startX = e.clientX; startY = e.clientY; startLeft = parseInt(containerEl.style.left); startTop = parseInt(containerEl.style.top);
        }
        containerEl.setPointerCapture(e.pointerId);
      };
      containerEl.onpointermove = (e) => {
        if (isDragging) { containerEl.style.left = `${startLeft + (e.clientX - startX) / window.scale}px`; containerEl.style.top = `${startTop + (e.clientY - startY) / window.scale}px`; }
        else if (isTransforming) {
          const currentMouseAngle = Math.atan2(e.clientY - centerY, e.clientX - centerX) * (180 / Math.PI);
          let deg = Math.round((startElementAngle + (currentMouseAngle - startAngleInitial)) / 22.5) * 22.5;
          containerEl.style.transform = `rotate(${deg}deg)`; containerEl.dataset.rotation = deg;
          lineEl.style.width = `${Math.max(15, Math.hypot(e.clientX - centerX, e.clientY - centerY) / window.scale)}px`;
        }
      };
      containerEl.onpointerup = (e) => { isDragging = isTransforming = false; containerEl.releasePointerCapture(e.pointerId); };
    };

    window.makeVegInteractive = function(vegEl) {
      let isDragging = false, moved = false, startX, startY, startLeft, startTop;
      vegEl.onpointerdown = (e) => {
        e.stopPropagation(); if (window.isBuildingModeActive && activeMode === 'remove') { vegEl.remove(); return; }
        clearSelection(); currentSelectedElement = vegEl; currentSelectedElement.classList.add('is-selected');
        moved = false; startX = e.clientX; startY = e.clientY; startLeft = parseInt(vegEl.style.left); startTop = parseInt(vegEl.style.top);
        if (window.isBuildingModeActive) { isDragging = true; vegEl.setPointerCapture(e.pointerId); }
      };
      vegEl.onpointermove = (e) => {
        if (!isDragging) { if (Math.abs(e.clientX - (startX||0)) > 5 || Math.abs(e.clientY - (startY||0)) > 5) moved = true; return; }
        moved = true; vegEl.style.left = `${startLeft + (e.clientX - startX) / window.scale}px`; vegEl.style.top = `${startTop + (e.clientY - startY) / window.scale}px`;
      };
      vegEl.onpointerup = (e) => { if (isDragging) { isDragging = false; vegEl.releasePointerCapture(e.pointerId); } if (!moved && activeMode !== 'remove') window.openVegDetails(vegEl); };
    };

    function updateWorkspaceTransform() { workspace.style.transform = `translate(${translateX}px, ${translateY}px) scale(${window.scale})`; const zBadge = document.getElementById('zoomBadge'); if (zBadge) zBadge.innerText = `${window.getI18n('zoom')}: ${Math.round(window.scale * 100)}%`; }
    window.resetGardenView = function() { const r = container.getBoundingClientRect(); window.scale = 0.8; translateX = (r.width / 2) - (1000 * window.scale); translateY = (r.height / 2) - (1000 * window.scale); updateWorkspaceTransform(); };

    function initGardenInteractions() {
      let lastX, lastY, isPanning = false, startDist = 0, initialScale = 1;
      container.onpointerdown = (e) => { if (e.target.closest('.garden-veg-container') || e.target.closest('.garden-line-container')) return; isPanning = true; lastX = e.clientX; lastY = e.clientY; container.setPointerCapture(e.pointerId); };
      container.onpointermove = (e) => { if (!isPanning) return; translateX += e.clientX - lastX; translateY += e.clientY - lastY; lastX = e.clientX; lastY = e.clientY; updateWorkspaceTransform(); };
      container.onpointerup = (e) => { isPanning = false; container.releasePointerCapture(e.pointerId); };
      container.addEventListener('touchstart', (e) => { if (e.touches.length === 2) { isPanning = false; startDist = Math.hypot(e.touches[0].pageX - e.touches[1].pageX, e.touches[0].pageY - e.touches[1].pageY); initialScale = window.scale; } }, { passive: true });
      container.addEventListener('touchmove', (e) => { if (e.touches.length === 2 && startDist > 0) { const d = Math.hypot(e.touches[0].pageX - e.touches[1].pageX, e.touches[0].pageY - e.touches[1].pageY), ratio = d / startDist, oldScale = window.scale; window.scale = Math.max(0.2, Math.min(4, initialScale * ratio)); const r = container.getBoundingClientRect(), cx = r.width / 2, cy = r.height / 2; translateX = cx - (cx - translateX) * (window.scale / oldScale); translateY = cy - (cy - translateY) * (window.scale / oldScale); updateWorkspaceTransform(); } }, { passive: true });
      container.addEventListener('click', (e) => handleCanvasClick(e.clientX, e.clientY, e.target));
    }

    window.addEventListener('DOMContentLoaded', () => { initGardenInteractions(); updateUI(); window.resetGardenView(); });
  </script>
